name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin-amd64
          - os: macos-14
            platform: darwin-arm64
          - os: ubuntu-latest
            platform: linux-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel pyinstaller pyyaml click

      - name: Inject version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          sed -i.bak "s/__version__ = \".*\"/__version__ = \"$VERSION\"/" src/devctl/__init__.py
          grep __version__ src/devctl/__init__.py

      - name: Build binary
        shell: bash
        run: |
          pip install -e . --no-build-isolation
          pyinstaller --onefile --name devctl --paths src src/devctl/cli/main.py

      - name: Rename artifact
        shell: bash
        run: |
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv devctl.exe devctl-${{ matrix.platform }}.exe
          else
            mv devctl devctl-${{ matrix.platform }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: devctl-${{ matrix.platform }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts and create manifest
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p release
          echo '{"latest_version": "'"$VERSION"'", "downloads": {' > manifest.json
          first=true
          for dir in artifacts/*/; do
            for f in "$dir"*; do
              [ -f "$f" ] || continue
              name=$(basename "$f")
              cp "$f" "release/$name"
              key="${name#devctl-}"
              key="${key%.exe}"
              url="https://github.com/${{ github.repository }}/releases/download/$VERSION/$name"
              if [ "$first" = true ]; then
                first=false
              else
                echo -n "," >> manifest.json
              fi
              echo -n "\"$key\": \"$url\"" >> manifest.json
            done
          done
          echo "}}" >> manifest.json
          cp manifest.json release/
          cat manifest.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}