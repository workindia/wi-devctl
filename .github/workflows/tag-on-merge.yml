name: Tag release on merge

on:
  pull_request:
    types:
      - closed

jobs:
  tag-release:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'cursor/ssl-certifi-fix'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create and push v0.4.1 tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a v0.4.1 -m "fix: bundle certifi CA certs for HTTPS in frozen devctl binary"
          git push origin v0.4.1
