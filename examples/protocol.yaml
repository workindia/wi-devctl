# Example protocol.yaml for devctl (protocol.yml also supported)
# Place this file in the ROOT of the repo you want to sync from.
# Then run: devctl ai-kit setup --repo <your-repo-url>
# Repo URL can be HTTPS (https://github.com/org/repo) or SSH (git@github.com:org/repo.git)

version: v1

protocols:
  - name: cursor
    type: file_sync
    source: .cursor
    target: ~/.cursor

    obligations:
      - rules/security.json

    recommendations:
      - skills/debugging.md

  # claude_hooks: syncs Claude Code hook definitions into ~/.claude/settings.json.
  # - Non-yaml files in source dir are copied to ~/.devctl/hooks/ (for hook scripts).
  # - hooks.yaml defines which hooks to install; removing it auto-uninstalls on next sync.
  - name: claude-hooks
    type: claude_hooks
    source: hooks
    target: ~/.claude/settings.json

# Example hooks/ directory layout in your config repo:
#
#   hooks/
#     hooks.yaml          # hook definitions (managed centrally)
#     skill_tracker.py    # hook script copied to ~/.devctl/hooks/
#
# hooks/hooks.yaml example:
#
#   hooks:
#     PreToolUse:
#       - matcher: Skill
#         hooks:
#           - type: command
#             command: "python3 ~/.devctl/hooks/skill_tracker.py"
