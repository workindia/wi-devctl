# Example protocol.yaml for devctl (protocol.yml also supported)
# Place this file in the ROOT of the repo you want to sync from.
# Then run: devctl ai-kit setup --repo <your-repo-url>
# Repo URL can be HTTPS (https://github.com/org/repo) or SSH (git@github.com:org/repo.git)

version: v1

protocols:
  - name: cursor
    type: file_sync
    source: .cursor
    target: ~/.cursor

    obligations:
      - rules/security.json

    recommendations:
      - skills/debugging.md
